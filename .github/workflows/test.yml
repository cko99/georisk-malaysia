name: Test GeoRich AI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -q
      - run: python scripts/validate_data.py data/sample/administrative.geojson
      - run: python scripts/validate_data.py data/sample/roads.geojson
      - run: python scripts/validate_data.py data/sample/rivers.geojson
      - run: python scripts/validate_data.py data/sample/hazards.geojson
