services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DEBUG: "false"
      CORS_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      DATABASE_URL: postgresql+psycopg://georich:georich@db:5432/georich
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: georich
      POSTGRES_USER: georich
      POSTGRES_PASSWORD: georich
    ports:
      - "5432:5432"
    volumes:
      - georich_postgres:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U georich -d georich"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  georich_postgres:
